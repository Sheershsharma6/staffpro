server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to backend
location /api/ {
    proxy_pass https://staffpro-backend.onrender.com/; 
    # Ensure Host header and SNI match the backend so TLS succeeds
    proxy_set_header Host staffpro-backend.onrender.com;
    proxy_ssl_server_name on;
    proxy_ssl_name staffpro-backend.onrender.com;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_send_timeout 90s;
    proxy_read_timeout 90s;
}

    # Proxy uploaded files
    location /uploads/ {
        proxy_pass https://staffpro-backend.onrender.com/uploads/;
        proxy_set_header Host staffpro-backend.onrender.com;
        proxy_ssl_server_name on;
        proxy_ssl_name staffpro-backend.onrender.com;
    }

    # React SPA — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
